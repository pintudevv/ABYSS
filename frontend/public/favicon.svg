<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E55" />
      <stop offset="100%" stop-color="#8B0000" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Dark Hexagon Base -->
  <polygon points="256,16 464,120 464,360 256,496 48,360 48,120" fill="#0A0A10" stroke="url(#shieldGrad)" stroke-width="20" stroke-linejoin="round" />

  <!-- Inner Shield Glow -->
  <polygon points="256,48 432,136 432,344 256,464 80,344 80,136" fill="rgba(255, 46, 85, 0.08)" stroke="rgba(255, 46, 85, 0.4)" stroke-width="8" stroke-linejoin="round" />

  <!-- ABYSS Cyber 'A' Shield Icon -->
  <path d="M 256,112 L 360,352 L 304,352 L 280,296 L 232,296 L 208,352 L 152,352 Z M 256,180 L 244,248 L 268,248 Z" fill="url(#shieldGrad)" filter="url(#glow)" />

  <!-- Central Cyan Core Core Pulse -->
  <circle cx="256" cy="256" r="24" fill="url(#coreGrad)" filter="url(#glow)" />
</svg>
